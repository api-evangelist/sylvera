aid: sylvera
name: Sylvera
description: >-
  Sylvera is a London-headquartered carbon data and climate intelligence
  platform — often described as the "Moody's for the voluntary carbon market"
  — providing independent ratings, market data, and geospatial analytics that
  help corporate buyers, investors, project developers, governments, and
  standards bodies make informed decisions across carbon and commodities
  markets. Founded in 2020 by Allister Furey and Samuel Gill, Sylvera combines
  remote sensing, machine learning over satellite imagery and LiDAR-derived
  biomass data, and on-the-ground project assessment to produce letter-graded
  ratings (e.g., AA, A, B) for carbon credit projects across nature-based
  (REDD+, ARR, IFM), engineered removals, renewable energy, and cookstove
  methodologies. The platform's product surface spans Ratings, Market
  Intelligence (supply, demand, and pricing signals), an Article 6 & CORSIA
  Hub for compliance risk, a Market Gateway to roughly 400 million tonnes of
  project inventory, Earth Analytics and a Biomass Atlas for geospatial MRV,
  and Commodity Insights covering CORSIA, LCFS, CFR, and FuelEU Maritime
  mechanism eligibility and carbon intensity assessments. Sylvera distributes
  its data through a web platform, downloadable reports, and a gated Carbon
  Credit Analytics API (base URL https://api.sylvera.com/v1, JSON API style,
  API-key auth) used to syndicate ratings and pricing into ESG and
  sustainability reporting tools such as Workiva, Persefoni, and Watershed.
  Commercial packaging runs Freemium, Essentials, and Enterprise tiers, with
  Accelerated Ratings, Market Forecasts, and Geospatial add-ons all sold via
  contact-sales; there is no public OpenAPI specification, no published SDK,
  and no Sylvera GitHub organization — the API and full ratings catalog are
  available only to authenticated enterprise customers.
